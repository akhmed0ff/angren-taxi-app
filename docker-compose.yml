version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: angren-taxi-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Set it in your .env file or environment}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DATABASE_PATH=/app/data/angren_taxi.db
      - DEFAULT_LANGUAGE=ru
      - BCRYPT_ROUNDS=10
    volumes:
      - taxi_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: angren-taxi-admin
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  taxi_data:
